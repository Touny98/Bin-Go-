events {
  worker_connections 1024;
}

http {
  # DNS interno de Docker. Al usar una variable en proxy_pass (abajo), nginx
  # re-resuelve el nombre del contenedor en cada request respetando este TTL,
  # en vez de cachear la IP para siempre al arrancar. Esto evita los 502 por
  # "connection refused" cuando app/admin-web se reinician y cambian de IP.
  resolver 127.0.0.11 valid=10s ipv6=off;

  server {
    listen 80;
    server_name _;

    # Aumentar timeouts para long-polling de socket.io
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;

    # ── /socket.io → backend (WebSocket) ──────────────────────────────────
    location /socket.io/ {
      set $api_backend http://app:3010;
      proxy_pass         $api_backend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host       $host;
      proxy_set_header   X-Real-IP  $remote_addr;
      proxy_cache_bypass $http_upgrade;
    }

    # ── /api → backend ────────────────────────────────────────────────────
    location /api/ {
      set $api_backend http://app:3010;
      proxy_pass         $api_backend;
      proxy_http_version 1.1;
      proxy_set_header   Host       $host;
      proxy_set_header   X-Real-IP  $remote_addr;
    }

    # ── Todo lo demás → panel admin ───────────────────────────────────────
    location / {
      set $admin_frontend http://admin-web:3001;
      proxy_pass         $admin_frontend;
      proxy_http_version 1.1;
      proxy_set_header   Host       $host;
      proxy_set_header   X-Real-IP  $remote_addr;
      # Necesario para Next.js HMR y hot reload en dev
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
    }
  }
}
