version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: bingo_prod_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bingo_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bingo_password}
      POSTGRES_DB: ${POSTGRES_DB:-bingo_db}
    ports:
      - "5432:5432"
    volumes:
      - pg_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bingo_prod_redis
    restart: always
    command: redis-server --appendonly yes --save 60 1
    ports:
      - "6379:6379"
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bingo_prod_app
    restart: always
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://${POSTGRES_USER:-bingo_user}:${POSTGRES_PASSWORD:-bingo_password}@postgres:5432/${POSTGRES_DB:-bingo_db}
      - REDIS_URL=redis://redis:6379
      - PORT=3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pg_prod_data:
  redis_prod_data:
