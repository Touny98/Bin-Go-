version: '3.8'

# Stack local.
# Acceso local:  API → localhost:3010 | Admin → localhost:3011
# Acceso externo (ngrok → nginx): https://discourse-handwork-switch.ngrok-free.dev
#   /api/*       → backend (app:3010)
#   /socket.io/* → backend (app:3010, WebSocket)
#   /*           → panel admin (admin-web:3001)

services:
  postgres:
    image: postgres:15-alpine
    container_name: bingo_local_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bingo_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bingo_password}
      POSTGRES_DB: ${POSTGRES_DB:-bingo_db}
    ports:
      - "5432:5432"
    volumes:
      - pg_local_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bingo_local_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_local_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bingo_local_app
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://${POSTGRES_USER:-bingo_user}:${POSTGRES_PASSWORD:-bingo_password}@postgres:5432/${POSTGRES_DB:-bingo_db}
      - REDIS_URL=redis://redis:6379
    ports:
      - "3010:3010"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - wwebjs_auth_local:/app/.wwebjs_auth
      - baileys_auth_local:/app/.baileys_auth
      - ./assets:/app/assets

  admin-web:
    build:
      context: ./apps/admin-web
      dockerfile: Dockerfile
    container_name: bingo_local_admin_web
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      # URL interna Docker para que Next.js haga el proxy server-side (/api/* → app:3010)
      - BACKEND_INTERNAL_URL=http://app:3010
    ports:
      - "3011:3001"
    depends_on:
      - app

  nginx:
    image: nginx:1.25-alpine
    container_name: bingo_local_nginx
    restart: unless-stopped
    volumes:
      - ./nginx-local.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "3012:80"   # acceso local directo via http://localhost:3012
    depends_on:
      - app
      - admin-web

  # Cloudflare Tunnel: expone el panel admin con URL fija sin tocar ngrok
  # Setup de una vez: ver instrucciones en CLOUDFLARE_SETUP.md
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: bingo_local_cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - nginx
    profiles:
      - admin-external   # solo arranca con: docker compose --profile admin-external up -d

  ngrok:
    image: ngrok/ngrok:latest
    container_name: bingo_local_ngrok
    restart: unless-stopped
    environment:
      # ngrok v3 lee NGROK_AUTHTOKEN del entorno directamente, sin escribir config
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    # Túnel original: solo API (webhooks MP y WhatsApp) — sin cambios
    entrypoint: ngrok
    command: start --all --config /etc/ngrok/ngrok-local.yml --log stdout
    volumes:
      - ./ngrok-local.yml:/etc/ngrok/ngrok-local.yml:ro
    ports:
      - "4040:4040"
    depends_on:
      - app

volumes:
  pg_local_data:
  redis_local_data:
  wwebjs_auth_local:
  baileys_auth_local:
